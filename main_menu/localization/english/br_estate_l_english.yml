l_english:
 akritai_privilege: "Akritai Privilege"
 akritai_privilege_desc: "Along the borders of Romanía, the Akritai stand as soldier-farmers and guardians of the marches. Granted wide autonomy, they are authorized to raid hostile frontiers, seize captives, and disrupt enemy lands. These practices secure the borders, but they also strengthen rural interests and hinder the consolidation of central rule."

 boyarski_voiski: "Boiárski Voĭski"
 boyarski_voiski_desc: "The traditional levy of the Bulgarian boyars forms the backbone of our armies. These noble households maintain armed retainers and provide large contingents of horsemen in times of war. By reaffirming their martial rights and obligations, we strengthen our military capacity—though at the cost of granting the boyars greater influence within the realm."

 br_special_trade_companies: "Chartered Trade Companies"
 br_special_trade_companies_desc: "By granting expansive privileges to powerful trade companies, the state entrusts overseas commerce and naval logistics to mercantile elites. In return, these companies sustain trade dominance, expand maritime reach, and shoulder much of the burden of naval upkeep."

 br_latin_trade_naval_reliance: "Latin Maritime Reliance"
 br_latin_trade_naval_reliance_desc: "Imperial naval administration has grown dependent upon Latin merchant fleets and their capital. In return for sustained access to ships and maritime expertise, the state has granted extensive commercial privileges, shifting naval costs outward while eroding native levies, sailors, and imperial control of the seas."

 br_roman_ecumenical_patriarch_privilege: "Prerogatives of the Ecumenical Patriarch"
 br_roman_ecumenical_patriarch_privilege_desc: "By ancient custom and recognized canon, the Ecumenical Patriarch exercises wide authority within the imperial church. These prerogatives strengthen the influence of the clergy in public life, extend the Church’s hand into diplomacy, and ensure the spiritual alignment of newly incorporated lands and subjects."

