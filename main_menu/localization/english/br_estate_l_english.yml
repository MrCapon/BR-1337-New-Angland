l_english:
 akritai_privilege: "Akritai Privilege"
 akritai_privilege_desc: "Along the borders of Romanía, the Akritai stand as soldier-farmers and guardians of the marches. Granted wide autonomy, they are authorized to raid hostile frontiers, seize captives, and disrupt enemy lands. These practices secure the borders, but they also strengthen rural interests and hinder the consolidation of central rule."

 boyarski_voiski: "Boiárski Voĭski"
 boyarski_voiski_desc: "The traditional levy of the Bulgarian boyars forms the backbone of our armies. These noble households maintain armed retainers and provide large contingents of horsemen in times of war. By reaffirming their martial rights and obligations, we strengthen our military capacity—though at the cost of granting the boyars greater influence within the realm."

 br_special_trade_companies: "Chartered Trade Companies"
 br_special_trade_companies_desc: "By granting expansive privileges to powerful trade companies, the state entrusts overseas commerce and naval logistics to mercantile elites. In return, these companies sustain trade dominance, expand maritime reach, and shoulder much of the burden of naval upkeep."

 br_latin_trade_naval_reliance: "Latin Maritime Reliance"
 br_latin_trade_naval_reliance_desc: "Imperial naval administration has grown dependent upon Latin merchant fleets and their capital. In return for sustained access to ships and maritime expertise, the state has granted extensive commercial privileges, shifting naval costs outward while eroding native levies, sailors, and imperial control of the seas."

 br_roman_ecumenical_patriarch_privilege: "Prerogatives of the Ecumenical Patriarch"
 br_roman_ecumenical_patriarch_privilege_desc: "By ancient canon and the dignity of New Rome, the Ecumenical Patriarch presides as first among hierarchs within the oikoumene. Through synod, embassy, and sacred decree, his authority extends across the sees of the Empire, guiding doctrine, shaping diplomacy, and binding newly restored lands to the Orthodox communion."

 br_bureaucrat_clergy: "Ekklēsiastikē Dioikēsis"
 br_bureaucrat_clergy_desc: "The sekreta of the Empire are entrusted to the logothetai, guardians of fisc and nomos throughout the oikoumene. By chrysobull and sealed ordinance, imperial command is reduced to written statute and enduring register. Thus the Basileus rules not by whim, but through ordered administration rooted in Roman law."

 br_themata_peasant_privilege: "Stratiōtai Land Grant"
 br_themata_peasant_privilege_desc: "Within the themes, land is held by stratiōtai bound to render service in defense of the Roman order. These free households, settled upon military allotments, furnish disciplined levies in time of war and uphold imperial authority in time of peace. Through this system, the state secures loyal levies drawn from free households, reinforcing provincial defense while tempering the dominance of magnate estates."

 br_dynatoi_magnates: "Dynatoi Magnate Privileges"
 br_dynatoi_magnates_desc: "Powerful landed magnates consolidate estates across the provinces, extending their authority over dependent cultivators and local administration. Their wealth strengthens rural production and fortifies the countryside, yet their growing dominance diminishes the independence of smaller households and shifts the balance of power away from the crown."

 br_frontier_expansion_privilege: "Frontier Homestead Privileges"
 br_frontier_expansion_privilege_desc: "Settler households on the frontier are granted broad autonomy to clear land, fortify their holdings, and subdue surrounding tribes. In exchange for protection and expansion, they are permitted to organize local militias and manage captured labor. This fosters hardy independence, though it weakens central oversight."