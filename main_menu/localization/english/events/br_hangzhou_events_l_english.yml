l_english:

#Petition to send bishop to Middle Kingdom
 hangzhou.1.title: "Strange Visitors"
 hangzhou.1.desc: "Strange visitors came to our palace in Antioch. It turned out they are followers of Christ that live far away in the Middle Kingdom. They got here by Silk Road and ask for our help. Their community is small and they have no bishop to guide them. They are heretics but maybe we could help them?"
 hangzhou.1.a: "They are God's children too."
 hangzhou.1.b: "They don't deserve our attention!"
 
 #Bishop arrived to Middle Kingdom
 hangzhou.2.title: "Bishop Arrived"
 hangzhou.2.desc: "It is told that the bishop we sent to Middle Kingdom has arrived to his destination."
 hangzhou.2.a: "May God bless him."
 hangzhou.2.b: "He is accompanied by our most talented missionary."
 
 hangzhou.3.title: "Patriarchate Established"
 hangzhou.3.desc: "For my profession of holy faith, I promise the canons of the Holy Apostles, the Seven Ecumenical and the God-fearing Local Councils and the canons of the Holy Fathers, to protect and preserve everything that they accepted, I accept, and everything they rejected, I reject."
 hangzhou.3.a: "Let the Middle Kingdom hear the Word of God."