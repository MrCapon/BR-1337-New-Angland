 br_byzantine_law_desc: "Roman law, evolving from Roman law with Christian and Hellenistic influence, largely derives from Justinian's #italic Corpus Juris Civilis#!, which emphasizes ceremonial emperor roles, and reflects philosophical and religious ideals."




 
