l_english:

 byzantine_law: "Roman Law"
 byzantine_law_desc: "Roman law, evolving from Roman law with Christian and Hellenistic influence, largely derives from Justinian's #italic Corpus Juris Civilis#!, which emphasizes ceremonial emperor roles, and reflects philosophical and religious ideals."

 br_pronoia_system: "Prónoia System"
 br_pronoia_system_desc: "The Prónoia system functions as a means of temporarily transferring imperial fiscal rights, such as taxes or income from various sources, to individuals or institutions. Unlike the feudal system prevalent in Europe at the time, Prónoia grants were neither hereditary nor transferable, and ultimate ownership remained with the Emperor. In exchange for these privileges, the system ultimately served the purpose for the head of state to raise an army in times of need, and entailed that the troops had to mostly cover their own expenses."
 
