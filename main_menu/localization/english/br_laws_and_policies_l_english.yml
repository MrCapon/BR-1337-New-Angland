l_english:

 byzantine_law: "Roman Law"
 byzantine_law_desc: "Roman law, evolving from Roman law with Christian and Hellenistic influence, largely derives from Justinian's #italic Corpus Juris Civilis#!, which emphasizes ceremonial emperor roles, and reflects philosophical and religious ideals."

 # Administrative Laws

 br_pronoia_system: "Prónoia System"
 br_pronoia_system_desc: "The Prónoia system functions as a means of temporarily transferring imperial fiscal rights, such as taxes or income from various sources, to individuals or institutions. Unlike the feudal system prevalent in Europe at the time, Prónoia grants were neither hereditary nor transferable, and ultimate ownership remained with the Emperor. In exchange for these privileges, the system ultimately served the purpose for the head of state to raise an army in times of need, and entailed that the troops had to mostly cover their own expenses."

 # Royal Court Customs Laws

 br_military_court_policy: "Stratiōtikón Court"
 br_military_court_policy_desc: "The royal court is shaped by the customs of the στρατιωτικοί, the landed military elite of Anatolia. Discipline, frugality, and service define court life, reinforcing the authority of commanders and binding the army closely to the state."

 br_naval_court_policy: "Nautikón Court"
 br_naval_court_policy_desc: "Court customs are influenced by the traditions of the fleet and the maritime cities. Admirals, merchants, and shipowners gain prominence, and naval service becomes a primary avenue of prestige and influence."

 br_roman_court_customs: "Roman Court"
 br_roman_court_customs_desc: "Court customs are deeply rooted in Roman traditions, emphasizing ceremony, hierarchy, and the central role of the emperor. The court serves as a stage for displaying imperial power and fostering loyalty among the elite, with elaborate rituals and a strong emphasis on protocol."

 # Cultural Traditions Laws
 br_roman_tradition: "Roman Tradition"
 br_roman_tradition_desc: "The Roman tradition emphasizes the legacy of Roman culture, law, and governance. It promotes a strong sense of identity tied to the Roman past, with a focus on civic duty, military service, and the preservation of classical knowledge and values."

 # Distribution of Power Laws

 br_roman_distribution_of_power_law: "Roman Distribution of Power"
 br_roman_distribution_of_power_law_desc: "The distribution of power is structured around the estates, with a strong emphasis on the role of the crown estate. The nobility and clergy have defined roles and privileges, but the crown maintains significant influence over the political and economic landscape, ensuring a balance of power that supports imperial authority."

 # Medieval Levy Laws

 br_thema_levies: "Thematic Levy System"
 br_thema_levies_desc: "Military service is organized around the themes, where landholding nobles are obligated to provide armed men in exchange for their estates. This system strengthens local defense while maintaining a professional core rooted in Roman military tradition."
 
 br_thema_levies_upgraded: "Enhanced Thematic Levy System"
 br_thema_levies_upgraded_desc: "The thematic levy system is further enhanced, increasing the size and combat efficiency of levies. This reform reflects the empire's need to adapt to evolving military challenges while maintaining its traditional reliance on landholding nobles for defense."

