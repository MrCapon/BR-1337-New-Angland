# Sources:
#   English, Greek, Turkish, Serbian, Bulgarian, Italian, and other languages' Wikipedia
#   Digital Atlas of the Roman Empire (University of Gothenburg, Sweden)
#   Nişanyan Yeradları - Inventory of Settlements in Turkey and Surrounding Countries
#   Pleiades Stoa
#   Trismegistos Places
