#   De Administando Imperio by Constantine VII
#   The Alexiad by Anna Komnene
#   The Historical Geography of Asia Minor by W. M. Ramsay
#   Damast Geschichte
#   DIE OSTGRENZE DES BYZANTINISCHEN REICHES by Ernst Honigmann
#   Map of Balkans and Asia Minor by Rigas Ferraios
#   Barrington Atlas of the Greek and Roman World
#   Links to all sources on my relevant Paradox Forum posts

# Notes:
#   1. I used Google's standard Modern Greek romanization for spelling, but I generally used archaic Greek grammar to represent that the standard written language was Koine Greek with contemporary 14th century phonology, which was pretty much the same as Modern Greek
#   2. Google Translate outputs a romanized version of Greek text below the Greek text, which you can use if you don't know how to read Greek
#   3. Please, for the love of god, do not use un-Hellenized Latin names. In many cases there are better, actual Greek names available, and even an invented name is more authentic

