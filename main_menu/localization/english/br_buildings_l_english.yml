 fishing_village_pearl_maintenance: "Pearl Farming"
 farming_village_wool_maintenance: "Wool Farming"
 farming_village_sturdy_crops_maintenance: "Grain Farming"
 farming_village_horses_maintenance: "Horse Ranch"
 forest_village_wild_game_maintenance: "Wild Game Hunting"
 forest_village_lumber_maintenance: "Lumber Farming"

 #Military

 orthodox_order_commandery: "Orthodox Order Commandery"
 orthodox_order_commandery_desc: "A fortified commandery established by an Orthodox military order beyond its own domains. From this house, revenues are drawn from the surrounding lands while new brethren are recruited into sacred service. Sustained through imperial sponsorship, the commandery binds piety and arms in defense of the Roman oikoumenē."
 orthodox_order_commandery_tt: "Owner grants [ShowRelationTypeName('military_sponsorship')] to us"

 br_varangian_recruitment_building: "Varangian Commandery"
 br_varangian_recruitment_building_desc: "An imperial compound maintained for the enlistment of northern warriors into Roman service. Here envoys and officers oversee the induction of Varangians, who pledge their axes and loyalty to the Basileus in exchange for pay, honor, and advancement within the Tágmata. From these halls, foreign strength is bound to imperial authority."

 br_tagmata_barracks: "Tágmata Barracks"
 br_tagmata_barracks_desc: "Permanent urban barracks housing the professional Tágmata regiments. Stationed only in provinces under firm imperial control, these soldiers answer directly to the Basileus. Costly to maintain yet disciplined and reliable, they embody the centralized military authority of the Roman state."

 br_soldier_farmers: "Théma Ktêma"
 br_soldier_farmers_desc: "A rural military holding established under the Théma system. Stratiōtai cultivate the land in peace and take up arms in defense of their province when summoned. Productive and resilient, these settlements strengthen the peasantry and preserve provincial autonomy alongside imperial service."

 br_pronoia_estate: "Prónoia Ktêma"
 br_pronoia_estate_desc: "A conditional land grant awarded in exchange for military obligation. The holder raises retainers and extracts revenue in the Emperor’s name, restoring order where direct control is weak. Yet each Prónoia entrenches the power of the Dynatoi, binding local strength to noble authority rather than the crown."

 br_naval_theme_hq: "Naútikon Théma Neōrion"
 br_naval_theme_hq_desc: "A fortified naval headquarters of the Naútikon Théma, combining administrative command with imperial shipyard facilities. From these harbors the Roman fleet is provisioned, constructed, and maintained, securing control of the seas and reinforcing maritime authority."
 br_naval_theme_hq_maintenance: "Neōrion Maintenance"

 br_soldier_farmers_cattle_maintenance: "Stratiōtai Livestock Ktêma"
 br_soldier_farmers_wool_maintenance: "Stratiōtai Wool Ktêma"
 br_soldier_farmers_sturdy_crops_maintenance: "Stratiōtai Grain Ktêma"
 br_soldier_farmers_horses_maintenance: "Stratiōtai Horse Ktêma"

 br_stratiotikon_thema_cattle_maintenance: "Stratiōtai Livestock Ktêma"
 br_stratiotikon_thema_wool_maintenance: "Stratiōtai Wool Ktêma"
 br_stratiotikon_thema_sturdy_crops_maintenance: "Stratiōtai Grain Ktêma"
 br_stratiotikon_thema_horses_maintenance: "Stratiōtai Horse Ktêma"

 br_stratiotikon_thema_estate: "Stratiōtikon Théma"
 br_stratiotikon_thema_estate_desc: "A reformed military district in which soldier-farmers are formally integrated into an organized provincial command structure. The land is no longer merely frontier allotment, but a structured military institution bound to imperial service."

 br_kekhrismene_pronoia: "Kekhrisménē Prónoia"
 br_kekhrismene_pronoia_desc: "A sanctioned and formally confirmed pronoia grant, regulated under imperial authority. While still entrusted to noble holders, its military obligations and revenues are more strictly defined and supervised by the crown."

 br_varangian_camp: "Varangian Camp"
 br_varangian_camp_desc: "A fortified encampment housing the foreign warriors of the Varangian Guard. Bound by oath to the Emperor alone, these axe-bearing elites form the innermost shield of the imperial throne, serving as both palace guardians and shock infantry in war."

 br_varangian_barracks: "Varangian Barracks"
 br_varangian_barracks_desc: "A permanent and well-provisioned stronghold of the Varangian Guard. No longer a mere encampment, this institutionalized corps serves as an elite imperial regiment, fiercely loyal to the Basileus and feared across the battlefield for its discipline and ferocity."

 br_tagmata_camp: "Tagmata Camp"
 br_tagmata_camp_desc: "A provincial encampment of the Tagmata, the professional regiments of the Empire. Drawn from loyal subjects and maintained under imperial authority, these troops provide a disciplined core to the field armies and reinforce order within the cities."

 br_pyrgoi: "Pyrgoi"
 br_pyrgoi_desc: "Chains of fortified watchtowers guard the frontiers, roads, and passes of the realm. These pyrgoi serve as observation posts, signal stations, and rallying points for local soldiers, extending the reach of imperial authority into even the most remote countryside."
 br_pyrgoi_maintenance: "Pyrgoi Garrison"

 br_kleisourai: "Kleisourai"
 br_kleisourai_desc: "Strategic mountain passes are sealed by fortified defenses known as kleisourai. Garrisons stationed in these narrow defiles control the approaches into the interior, forcing invaders to advance through deadly choke points where defenders can inflict heavy losses and halt entire armies."
 br_kleisourai_maintenance: "Kleisourai Garrison"
