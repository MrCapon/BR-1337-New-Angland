l_english:
 
#ERE
 br_imperial_administration: "Imperial Dioikēsis"
 br_imperial_administration_desc: "From the capital radiates a carefully ordered hierarchy of offices and dignities through which the Oikoumenē is administered. Rank, stipend, and command are granted by imperial decree, ensuring that those who hold title do so as servants of the Basileía rather than as independent lords. When authority is firm, the Crown rises above faction and magnate ambition; yet should the throne falter, those accustomed to rank and revenue may test the limits of their submission."

 br_sub_theme_subject: "Theme Subject"
 br_sub_theme_subject_desc: "A system of provincial headquarters and armies, spearheaded by a strategos with dual responsibilities to protect the locals and establish authority at the behest of the [GetCountry('BYZ').GetFlavorRank]. This system replaced the provincial administration of Diocletian and has served our people ever since."

 br_sub_pronoia_subject: "Pronoïakon Ktéma"
 br_sub_pronoia_subject_desc: "The Prónoia system functions as a means of temporarily transferring imperial fiscal rights, such as taxes or income from various sources, to individuals or institutions. Unlike the feudal system prevalent in Europe at the time, Prónoia grants were neither hereditary nor transferable, and ultimate ownership remained with the Emperor. In exchange for these privileges, the system ultimately served the purpose for the head of state to raise an army in times of need, and entailed that the troops had to mostly cover their own expenses."

 br_naval_akritai_reform: "Naval Theme Administration"
 br_naval_akritai_reform_desc: "Coastal and island districts are organized into naval themes, where land, service, and fleet obligation are bound together. Through regulated levies and permanent maritime infrastructure, the state sustains large galley forces, rapid embarkation, and disciplined control of the frontier seas."

#Other
 br_new_world_colonial_reform: "New World Colony"
 br_new_world_colonial_reform_desc: "Established to support life at the edge of the known world, this colonial structure encourages exploration, organized settlement, and steady population growth as new lands are charted and claimed."

 br_mongol_tolerance: "Steppe Tolerance"
 br_mongol_tolerance_desc: "Ruling over a vast and diverse steppe realm, the state governs through pragmatism rather than enforced unity. Customs, faiths, and peoples are permitted to coexist so long as tribute flows and order is maintained. This tolerance eases cultural administration but slows efforts at assimilation and religious conversion."

 anatolian_beylik: "Beylik"
 anatolian_beylik_desc: "We have emerged after the decay of the Seljuk Sultanate, whose borders we once inhabited. Hardened warriors and capable bureaucrats form the solid base of our robust government."


 