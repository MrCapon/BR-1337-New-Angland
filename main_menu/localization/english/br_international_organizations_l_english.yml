l_english:


 roman_world: "Romaiokratía"
 roman_world_desc: "Romaiokratía is the system through which Roman supremacy is recognized and upheld. It encompasses all realms and authorities that acknowledge the Basileus as the ultimate source of legitimacy, whether directly ruled or bound by obligation. Each member strengthens imperial authority, while failure to honor duties weakens the cohesion of the Roman order."

 #or

 #roman_world: "Oikoumenē"
 #roman_world_desc: "Oikoumenē represents the universal Roman claim to rule the civilized world. It reflects the ideological and institutional reach of Constantinople as the center of order, law, and imperial legitimacy. As the Basileus strengthens his authority, the Oikoumenē expands—binding diverse peoples, provinces, and realms into a single Roman vision of civilization under imperial stewardship."

 #or 

 #roman_world: "Basileía tōn Romaíon"
 #roman_world_desc: "Basileía tōn Romaíon represents the institutional heart of the Roman Empire: its laws, offices, treasury, and mechanisms of rule centered in Constantinople. It reflects the capacity of the Basileus to govern directly through established authority, administration, and tradition. A strong Basileía ensures stability, obedience, and effective governance, while weakness within it undermines imperial control regardless of external recognition."
 game_concept_roman_authority_gc: "Auctoritas"
 game_concept_roman_authority_gc_desc: "Auctoritas represents the recognized legitimacy and moral authority of the Basileus. It is not enforced by arms alone, but granted through acknowledgment, tradition, and acceptance of Roman supremacy. As more realms and authorities recognize the imperial order, Roman Authority grows, enabling the Basileus to command obedience, enforce decrees, and uphold Roman rule. When Roman Authority wanes, imperial power loses its binding force, regardless of military strength."

 RW_LEADER: "Basileus"
 NUMBER_OF_ROMAN_MEMBERS: "Romaiokratía Members"
 CURRENT_ROMAN_AUTHORITY: "Current Auctoritas"

 roman_authority: "Auctoritas" #or Oikoumenikón, Legitimitas, Caesarian, Imperial Authority, Imperium, Maiestas, Dominium, Exousía, Kýros
 roman_authority_DISPLAY: "Auctoritas"
 roman_authority_desc: "Auctoritas represents the recognized legitimacy and moral authority of the Basileus. It is not enforced by arms alone, but granted through acknowledgment, tradition, and acceptance of Roman supremacy. As more realms and authorities recognize the imperial order, Auctoritas grows, enabling the Basileus to command obedience, enforce decrees, and uphold Roman rule. When Auctoritas wanes, imperial power loses its binding force, regardless of military strength."
 roman_tribute: "Phóros" #or Sýntaxis, Aporá, 
 roman_tribute_price: "Phóros"
 roman_tribute_desc: "Phóros represents the regular payments and material contributions remitted to Constantinople by members of the Roman order. It reflects the fiscal obligations that sustain the imperial administration, court, and defenses of the empire. Steady Phóros ensures the effective functioning of Roman rule, while shortfalls strain the treasury and weaken the empire’s ability to project authority and maintain order."

 br_emperor: "Basileus"
 br_emperor_desc: "The Basileus and Autokrator of the Romans, crowned in Constantinople and heir to the legacy of the Caesars, whose sacred duty is to safeguard the Empire and rule the Roman world."

 domestikos_west: "Domestikos of the West" #Domestikos tōn Scholōn of the West
 domestikos_west_desc: "The Domestikos of the West commands the imperial tagmata and field armies of the European provinces, entrusted with defending the western dominions of the Roman Empire."

 domestikos_east: "Domestikos of the East" #Domestikos tōn Scholōn of the East
 domestikos_east_desc: "The Domestikos of the East commands the imperial armies of Anatolia and the eastern themes, bearing the grave duty of guarding the Empire's ancient heartlands."

 imperial_loyalist: "Imperial Loyalist"
 imperial_loyalist_desc: "From humble pronoia holders to the powerful governors of themes and katepanates, these officials remain faithful to the Basileus and the authority of Constantinople."

 defiant_strategoi: "Defiant Strategos"
 defiant_strategoi_desc: "From ambitious strategoi to powerful dynatoi, these provincial rulers heed the commands of Constantinople only when it suits them, ruling their lands with near independence while imperial authority wanes."

 roman_world_bestow_domestikos_west: "Appoint Domestikos of the West"
 roman_world_bestow_domestikos_west_desc: "Grant the dignity of Domestikos of the West, entrusting the command of the Empire's western armies to a loyal servant of the Basileus."
 roman_world_rescind_domestikos_west: "Rescind the Domestikos of the West"
 roman_world_rescind_domestikos_west_desc: "Strip the current holder of the dignity of Domestikos of the West and return command of the western armies to the imperial court."

 roman_world_bestow_domestikos_east: "Appoint Domestikos of the East"
 roman_world_bestow_domestikos_east_desc: "Grant the dignity of Domestikos of the East, placing the imperial armies of Anatolia and the eastern themes under a trusted commander."
 roman_world_rescind_domestikos_east: "Rescind the Domestikos of the East"
 roman_world_rescind_domestikos_east_desc: "Strip the current holder of the dignity of Domestikos of the East and restore the command of the eastern armies to the Basileus."

 DISTANCE_FROM_ROMANLAND: "Distance from Romanía"
