 br_romaiokratia_law: "Romaiokratía"
 br_romaiokratia_law_desc: "Romaiokratía defines the order through which the Basileus asserts authority across the Oikoumenē. Through it, lands and rulers are drawn into a hierarchy of obligation, service, and submission, binding the Roman world into a single imperial system of governance."

 br_romaiokratia_weak_policy: "Nominal Supremacy"
 br_romaiokratia_weak_policy_desc: "Imperial authority is acknowledged in name, but little binds the members of the Oikoumenē beyond custom and tradition. The Basileus holds prestige, yet his influence remains limited."

 br_romaiokratia_low_policy: "Recognized Authority"
 br_romaiokratia_low_policy_desc: "The authority of the Basileus is formally recognized among the realms of the Oikoumenē. While still largely autonomous, members increasingly look to Constantinople for legitimacy and guidance."

 br_romaiokratia_medium_policy: "Imperial Arbitration"
 br_romaiokratia_medium_policy_desc: "The Basileus stands as arbiter among the realms of the Oikoumenē, mediating disputes and asserting a growing role in their governance. Imperial authority extends beyond recognition into active oversight."

 br_romaiokratia_high_policy: "Imperial Integration"
 br_romaiokratia_high_policy_desc: "The structures of Romaiokratía bind the Oikoumenē ever closer to Constantinople. Administration, diplomacy, and authority increasingly flow through imperial institutions, strengthening unity under the Basileus."

 br_romaiokratia_annex_policy: "Universal Dominion"
 br_romaiokratia_annex_policy_desc: "The Oikoumenē stands unified under the undisputed authority of the Basileus. Distinctions between subject and ally fade as all are drawn fully into the imperial order, securing peace and supremacy across the Roman world."