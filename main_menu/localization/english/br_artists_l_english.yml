l_english:

church_of_chora: "Monē tou Christou tou Chōra"
church_of_chora_desc: "A late imperial monastic church famed for its refined mosaics and frescoes, exemplifying the final flowering of Constantinopolitan sacred art and theological sophistication."

monastery_of_stoudios: "Monē tou Stoudiou"
monastery_of_stoudios_desc: "One of the great monastic foundations of the Queen of Cities, long serving as a center of learning, liturgical reform, and manuscript production."

great_palace_triklinos: "Triklinos of the Great Palace"
great_palace_triklinos_desc: "The ceremonial halls of the imperial palace, where architecture, ritual, and hierarchy combined to project the universal authority of the Roman Emperor."

rotunda_of_galerius: "Rotunda of Thessalonikē"
rotunda_of_galerius_desc: "A monumental domed structure inherited from late antiquity and adapted for Christian worship, embodying the continuity of Roman imperial architecture."

church_of_hagia_sophia_nicaea: "Hagia Sophia of Nikaia"
church_of_hagia_sophia_nicaea_desc: "The principal church of Nikaia, closely associated with councils, doctrine, and the exercise of imperial authority."

#mystras_palace_complex: "Palace of the Despots of the Morea"
#mystras_palace_complex_desc: "The administrative and ceremonial heart of Mystras, reflecting the final court culture of the Roman world through fortified elegance and refined architecture."

vladimir_icon_of_mary: "Mother of God of Vladimir"
vladimir_icon_of_mary_desc: "A revered Constantinopolitan icon celebrated for its emotional depth and enduring influence on Orthodox devotional art."

theo_metochites_donor_mosaic: "The Metochites Donor Mosaic"
theo_metochites_donor_mosaic_desc: "A courtly mosaic portraying imperial patronage, uniting humility, scholarship, and authority through visual symbolism."

daphni_christ_pantokrator: "Christ Pantokrator of Daphni"
daphni_christ_pantokrator_desc: "A commanding dome image presenting Christ as universal ruler, marked by balance, restraint, and solemn imperial authority."

nea_moni_mosaic_cycle: "Mosaics of Nea Moni"
nea_moni_mosaic_cycle_desc: "An imperial mosaic program renowned for its luminous color, refined figures, and theological coherence."

dionysiou_fresco_cycle: "Dionysiou Fresco Cycle"
dionysiou_fresco_cycle_desc: "A monumental series of frescoes reflecting mature monastic painting and disciplined narrative composition."

nerezi_fresco_cycle: "Nerezi Fresco Cycle"
nerezi_fresco_cycle_desc: "Expressive frescoes distinguished by emotional intensity, fluid movement, and refined sacred portraiture."

leo_bible: "The Bible of Leo"
leo_bible_desc: "A lavish imperial manuscript reflecting refined calligraphy, ceremonial presentation, and courtly sponsorship."

menologion_of_basil: "Menologion of Basil II"
menologion_of_basil_desc: "An illuminated liturgical calendar presenting saints and feasts within a unified imperial visual program."

alexiad: "The Alexiad"
alexiad_desc: "A courtly historical narrative blending personal testimony with political analysis, offering a detailed account of imperial governance and war."

synopsis_historion: "Synopsis of Histories"
synopsis_historion_desc: "A concise chronicle presenting centuries of history through ordered narrative and moral reflection."

theophanes_continuatus: "Continuation of Theophanes"
theophanes_continuatus_desc: "A court-sponsored continuation of Roman historiography preserving imperial perspectives on state and dynasty."

chronographia: "Chronographia"
chronographia_desc: "A sophisticated historical work combining biography, moral reflection, and political commentary."

taktika_of_leo: "Taktika"
taktika_of_leo_desc: "An imperial military treatise outlining strategy, discipline, and command within the professional Roman army."

strategikon: "Strategikon"
strategikon_desc: "A foundational manual on warfare emphasizing adaptability, intelligence, and organizational discipline."

syntagma_canonum: "Syntagma Canonum"
syntagma_canonum_desc: "A comprehensive legal and ecclesiastical compilation organizing centuries of canonical tradition."

kontakia_of_romanos: "Kontakia of Romanos"
kontakia_of_romanos_desc: "Liturgical hymns renowned for poetic power, dramatic structure, and theological depth."

kontakion_hymn_tradition: "Cathedral Kontakion Tradition"
kontakion_hymn_tradition_desc: "A developed tradition of urban hymnody shaping communal worship and sacred performance."

imperial_consular_diptych: "Imperial Consular Diptych"
imperial_consular_diptych_desc: "A ceremonial object symbolizing office, hierarchy, and the continuity of Roman state tradition."

loros_imperial_regalia: "Imperial Ceremonial Loros"
loros_imperial_regalia_desc: "Sacred regalia worn in imperial ritual, embodying authority through form, tradition, and symbolism."

relics_of_saint_basil: "Relics of Saint Basil the Great"
relics_of_saint_basil_desc: "Sacred remains venerated for their spiritual authority and enduring theological legacy."

church_of_saint_nicholas_myra: "Church of Saint Nicholas of Myra"
church_of_saint_nicholas_myra_desc: "A major pilgrimage church linked to the cult of a widely revered saint and benefactor."

red_basilica_pergamon: "The Red Basilica of Pergamon"
red_basilica_pergamon_desc: "A vast late antique structure repurposed for Christian worship, distinguished by its monumental scale."

sumela_monastery: "Monē Panagias Soumelas"
sumela_monastery_desc: "A dramatic monastic complex set high within the Pontic cliffs, combining isolation, devotion, and imperial patronage."

cappadocian_church_frescoes: "Cappadocian Rock-Cut Church Frescoes"
cappadocian_church_frescoes_desc: "Wall paintings adorning rock-cut churches, notable for narrative clarity and regional monastic character."

trebizond_hagia_sophia_frescoes: "Frescoes of Hagia Sophia of Trebizond"
trebizond_hagia_sophia_frescoes_desc: "A refined fresco program reflecting late imperial court culture and regional artistic tradition."

cappadocian_monastic_scriptoria: "Cappadocian Monastic Scriptoria"
cappadocian_monastic_scriptoria_desc: "Provincial centers of manuscript production preserving sacred and scholarly texts."

eastern_theme_fortifications: "Fortifications of the Eastern Themes"
eastern_theme_fortifications_desc: "Defensive works reflecting the strategic organization and military priorities of the Roman eastern provinces."

san_vitale_ravenna: "San Vitale of Ravenna"
san_vitale_ravenna_desc: "A centrally planned imperial church renowned for monumental mosaics and architectural harmony."

sant_apollinare_classe: "Sant’Apollinare in Classe"
sant_apollinare_classe_desc: "A basilica celebrated for luminous apse mosaics and early imperial Christian symbolism."

cappella_palatina: "Palatine Chapel of Palermo"
cappella_palatina_desc: "A royal chapel uniting Roman ceremonial art with local and eastern influences."

monreale_mosaic_cycle: "Monreale Mosaic Cycle"
monreale_mosaic_cycle_desc: "An immense and unified mosaic program depicting sacred history across walls and vaults."

ravenna_imperial_mosaics: "Imperial Mosaics of Ravenna"
ravenna_imperial_mosaics_desc: "Courtly mosaics portraying imperial authority, ritual, and sacred legitimacy."

san_marco_mosaic_program: "San Marco Mosaic Program"
san_marco_mosaic_program_desc: "A vast interior cycle drawing directly from Roman artistic traditions."

studenica_monastery: "Studenica Monastery"
studenica_monastery_desc: "A monumental monastery blending Roman architectural forms with regional stonework."

gracanica_monastery: "Gračanica Monastery"
gracanica_monastery_desc: "A refined cross-domed church representing the late medieval flowering of Roman ecclesiastical design."

holy_apostles_thessaloniki: "Church of the Holy Apostles of Thessalonikē"
holy_apostles_thessaloniki_desc: "A richly ornamented metropolitan church reflecting mature urban religious architecture."

ohrid_fresco_cycle: "Ohrid Fresco Cycle"
ohrid_fresco_cycle_desc: "An influential fresco cycle combining expressive figures with formal Roman composition."

hosios_loukas_monastery: "Monē Hosíou Loukâ"
hosios_loukas_monastery_desc: "A masterwork of middle-period Roman architecture, famed for its harmonious proportions and mosaics."

alahan_monastery: "Alahan Monastery"
alahan_monastery_desc: "An early monumental complex reflecting the transition from late antique to medieval sacred architecture."

latmos_frescoes: "Latmos Frescoes"
latmos_frescoes_desc: "Rare provincial wall paintings preserving early medieval religious imagery."

lycia_church_mosaics: "Lycia Church Mosaics"
lycia_church_mosaics_desc: "Regional mosaics demonstrating the diffusion of Roman artistic language into Anatolia."

nativity_church_mosaics: "Nativity Church Mosaics"
nativity_church_mosaics_desc: "Imperial-era restorations adorning one of the most revered sacred sites of Christendom."

saint_catherine_monastery: "Monastery of Saint Catherine of Sinai"
saint_catherine_monastery_desc: "A fortified monastic complex preserving architecture, icons, and manuscripts of immense antiquity."

sinai_christ_pantokrator: "Christ Pantokrator of Sinai"
sinai_christ_pantokrator_desc: "A profoundly influential image defining the canonical representation of Christ in sacred art."

sinai_icon_collection: "Sinai Icon Collection"
sinai_icon_collection_desc: "A unique survival of early devotional images preserved through centuries of upheaval."

red_monastery_sohag: "Red Monastery of Sohag"
red_monastery_sohag_desc: "A monumental brick monastery distinguished by sculptural interiors and painted decoration."

white_monastery_sohag: "White Monastery of Sohag"
white_monastery_sohag_desc: "An imposing stone complex combining classical forms with local religious tradition."

coptic_roman_icon_tradition: "Egyptian Roman Icon Tradition"
coptic_roman_icon_tradition_desc: "A regional school blending inherited Roman iconography with local artistic expression."

bagrati_cathedral: "Bagrati Cathedral"
bagrati_cathedral_desc: "A royal cathedral symbolizing the spread of Roman architectural ideals into the Caucasus."

gelati_monastery: "Gelati Monastery"
gelati_monastery_desc: "A center of learning and art where architecture, scholarship, and sacred imagery converged."

great_palace_of_constantinople: "Méga Palátion"
great_palace_of_constantinople_desc: "The principal imperial residence and ceremonial heart of the Roman state, comprising audience halls, chapels, residences, and gardens where emperors governed and enacted the rituals of empire."

blachernae_palace: "Blachérnai Palace"
blachernae_palace_desc: "A later imperial residence near the land walls, favored by emperors for its defensible position and evolving ceremonial functions."

bucoleon_palace: "Boukoléōn Palace"
bucoleon_palace_desc: "A waterfront palace overlooking the Sea of Marmara, serving as a ceremonial residence and private retreat for the imperial household."

palace_of_the_despots_mystras: "Palace of the Despots of the Morea"
palace_of_the_despots_mystras_desc: "A dynastic residence and administrative court granted to imperial kin, symbolizing delegated authority within the Roman provincial order."

trebizond_palace: "Imperial Palace of Trebizond"
trebizond_palace_desc: "A regional imperial residence serving as the ceremonial and administrative center of Roman authority along the eastern Black Sea."

thessaloniki_imperial_palace: "Imperial Palace of Thessaloniki"
thessaloniki_imperial_palace_desc: "A provincial imperial court reflecting Thessaloniki’s role as a major administrative, military, and ceremonial center."

nicaea_imperial_residence: "Imperial Residence of Nicaea"
nicaea_imperial_residence_desc: "An administrative palace serving the emperors during periods of extended residence in western Anatolia."

magnaura_palace: "Magnaura Residence"
magnaura_palace_desc: "An aristocratic residence adjoining the imperial quarter of Constantinople, long associated with learning, diplomacy, and elite instruction. Though not an imperial palace, the Magnaura served as a gathering place for scholars, officials, and foreign envoys."

boukoleon_villa: "Boukoleon Waterfront Villas"
boukoleon_villa_desc: "A cluster of elite residences overlooking the Sea of Marmara, favored by high-ranking courtiers and members of the imperial household seeking privacy away from the formal ceremonial spaces of the capital."

senatorial_hill_residences: "Senatorial Hill Residences"
senatorial_hill_residences_desc: "Urban mansions belonging to Constantinople’s ancient senatorial families, reflecting the enduring prestige of Roman civic aristocracy within the imperial capital."

athenian_aristocratic_estates: "Athenian Aristocratic Estates"
athenian_aristocratic_estates_desc: "Refined residences of Athens’ landed and scholarly elite, blending classical traditions with Roman administrative culture and serving as centers of education and local patronage."

thessaloniki_urban_villas: "Urban Villas of Thessaloniki"
thessaloniki_urban_villas_desc: "Well-appointed mansions owned by merchant magnates and provincial aristocrats, reflecting Thessaloniki’s role as a major commercial and administrative hub of the Roman world."

ohrid_episcopal_residence: "Episcopal Residence of Ohrid"
ohrid_episcopal_residence_desc: "A fortified yet refined residence serving both clerical and aristocratic functions, symbolizing Ohrid’s importance as a religious and cultural center of the western Balkans."

nicaea_governors_residence: "Governor’s Residence of Nicaea"
nicaea_governors_residence_desc: "An elite administrative mansion used by provincial governors and senior officials, reflecting Nicaea’s longstanding role as a center of governance, law, and theology."

cappadocian_estate_villas: "Cappadocian Estate Villas"
cappadocian_estate_villas_desc: "Rural mansions carved into and built alongside Cappadocia’s distinctive landscape, serving as residences for landed elites, monastic patrons, and military administrators."

latmos_aristocratic_residences: "Latmos Aristocratic Residences"
latmos_aristocratic_residences_desc: "Secluded elite estates near Mount Latmos, favored by scholars, patrons of monastic communities, and provincial notables seeking retreat and contemplation."

ravenna_court_residences: "Court Residences of Ravenna"
ravenna_court_residences_desc: "Elegant mansions housing senior officials and courtiers, reflecting Ravenna’s continued importance as an administrative and ceremonial center of Roman authority in Italy."

palatine_aristocratic_houses: "Palatine Aristocratic Houses"
palatine_aristocratic_houses_desc: "Prestigious residences on and around the Palatine Hill, maintaining the legacy of Rome’s senatorial elite and their enduring claim to ancient civic prestige."

#palermo_court_villas: "Court Villas of Palermo"
#palermo_court_villas_desc: "Refined villas associated with Sicily’s courtly and administrative elite, blending Roman traditions with local architectural influences."

jerusalem_patriarchal_residence: "Patriarchal Residence of Jerusalem"
jerusalem_patriarchal_residence_desc: "A distinguished mansion serving the city’s highest clerical authority, combining spiritual prestige with aristocratic refinement in one of the Roman world’s most sacred cities."

alexandrian_scholarly_villas: "Alexandrian Scholarly Villas"
alexandrian_scholarly_villas_desc: "Residences of philosophers, physicians, and learned elites, continuing Alexandria’s ancient tradition as a center of scholarship, science, and intellectual exchange."

# ==========================================
# ANATOLIA – ADDITIONAL REGIONAL WORKS
# ==========================================

icon_of_saint_thekla: "Icon of Saint Thekla"
icon_of_saint_thekla_desc: "A regional devotional icon venerating Saint Thekla, reflecting local traditions of sanctity and provincial Roman iconographic style."

anatolian_theme_chronicle: "Chronicle of the Anatolian Themes"
anatolian_theme_chronicle_desc: "A provincial historical account documenting the administration, warfare, and social life of the Roman themes of central Anatolia."

ecclesiastical_liturgical_codex: "Ecclesiastical Liturgical Codex of Iconium"
ecclesiastical_liturgical_codex_desc: "A cathedral-produced liturgical manuscript preserving regional rites, hymns, and ceremonial practices."

christ_enthroned_iconium: "Christ Enthroned of Iconium"
christ_enthroned_iconium_desc: "A metropolitan icon depicting Christ in majesty, combining classical compositional balance with regional theological emphasis."

anatolian_ecclesiastical_law: "Anatolian Ecclesiastical Canon Law"
anatolian_ecclesiastical_law_desc: "A clerical legal treatise compiling canon law traditions adapted to the ecclesiastical realities of Roman Anatolia."

sivas_military_manual: "Military Manual of Sebasteia"
sivas_military_manual_desc: "A practical military treatise reflecting frontier warfare, logistics, and command traditions of eastern Roman provinces."

armenian_notable_mansion: "Mansion of an Armenian Notable"
armenian_notable_mansion_desc: "An elite urban residence representing the integration of Armenian provincial elites into Roman administrative and social life."

theotokos_of_tarsus: "Theotokos of Tarsus"
theotokos_of_tarsus_desc: "A revered Marian icon expressing local devotional culture and the enduring theological traditions of Cilicia."

cilician_court_annals: "Cilician Court Annals"
cilician_court_annals_desc: "Courtly historical records documenting governance, diplomacy, and elite affairs in the Roman provinces of Cilicia."

antalya_prayer_book: "Antalya Illuminated Prayer Book"
antalya_prayer_book_desc: "A finely illuminated devotional manuscript blending regional artistic motifs with established Roman liturgical forms."

saint_nicholas_of_tarsus: "Saint Nicholas of Tarsus"
saint_nicholas_of_tarsus_desc: "A devotional icon emphasizing local traditions surrounding Saint Nicholas and his regional cult."

aphrodisias_temple_church: "Temple-Church of Aphrodisias"
aphrodisias_temple_church_desc: "A converted monumental structure illustrating the Christian adaptation of classical sacred architecture."

cappadocian_merchant_villas: "Cappadocian Merchant Villas"
cappadocian_merchant_villas_desc: "Affluent residential complexes reflecting the prosperity of Cappadocian trade networks and urban society."
