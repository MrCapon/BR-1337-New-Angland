l_english:

### Age 1 — Traditions

 br_tagmata_skoutatoi: "Skoutatoi"
 br_tagmata_skoutatoi_desc: "Professional heavy infantry of the imperial tagmata, equipped with large shields and spears. Disciplined and resilient, the Skoutatoi form the steadfast core of Roman field armies, excelling at holding the line under pressure."

 br_tagmata_toxotai: "Toxotai"
 br_tagmata_toxotai_desc: "Trained archers drawn from the tagmata and frontier regions, the Toxotai provide flexible ranged support. Though lightly armored, their skill with the bow allows them to harass and weaken the enemy before close engagement."

 n_vinland_longship: "Viking Longship"
 n_vinland_longship_desc: "A Viking longship was a fast, shallow-draft, clinker-built vessel used by Norse people for exploration, trade, and raiding, famous for its speed, flexibility, and ability to navigate both open seas and shallow rivers."
 
 br_tagmata_ballistai: "Ballistai"
 br_tagmata_ballistai_desc: "An evolution of classical Roman siegecraft adapted for the battlefield. These torsion-powered engines hurl bolts and stones to break enemy cohesion, favoring open ground and disciplined support from infantry formations."

 br_unit_trebuchet: "Trebuchets"
 br_unit_trebuchet_desc: "Large counterweight-driven siege engines designed to batter fortifications and undermine enemy morale. Trebuchets are powerful but slow to deploy, requiring secure positions and extensive logistical support to operate effectively."

### Age 2 — Renaissance

 br_renaissance_varangians: "Tágma tōn Varangōn"
 br_renaissance_varangians_desc: "Axe-bearing Varangians sworn by ancient oath to defend the Basileus. Though foreign in origin, they stand as an elite corps within the Tagmata, preserving their northern martial traditions in imperial service."

 br_age_2_kontaratoi: "Kontaratoi"
 br_age_2_kontaratoi_desc: "The lance-bearing cavalry of the Tagmata, armored in mail and trained for disciplined shock. They descend directly from the cataphract tradition, breaking enemy lines through weight, cohesion, and controlled violence."

### Age 3 — Discovery

 br_discovery_varangians: "Varangoi Arkebousiophoroi"
 br_discovery_varangians_desc: "Taking up the arquebus without abandoning their inherited discipline, the Varangians adapt to the changing art of war while remaining a distinct and oath-bound foreign guard."

 br_age_3_lonchophoroi: "Lonchophoroi"
 br_age_3_lonchophoroi_desc: "Refined in drill and equipment, the Lonchophoroi preserve the heavy charge of the cataphracts while strengthening their endurance in prolonged engagements. Their purpose remains unchanged: to shatter the enemy at the decisive moment."

### Age 4 — Reformation

 br_reformation_varangians: "Varangoi Mousketophoroi"
 br_reformation_varangians_desc: "Now drilled in coordinated volleys and close formations, the Varangians serve as musket-bearing elite infantry. Recruited from beyond the Empire, they retain their unique identity even as their methods evolve."

 br_age_4_thorakophoroi: "Thorakophoroi"
 br_age_4_thorakophoroi_desc: "Clad in reinforced cuirasses and mounted on barded steeds, the Thorakophoroi adapt to evolving warfare without abandoning the shock doctrine of their forebears. When committed, they strike as a single armored mass."

### Age 5 — Absolutism

 br_absolutism_varangians: "Varangōn Parataxeis"
 br_absolutism_varangians_desc: "Drawn up in ordered ranks, the Varangian formations fight as disciplined lines sustained by imperial pay and privilege. Their cohesion reflects centuries of tradition carried from distant homelands into the heart of the Empire."

 br_age_5_prokoursatores: "Prokoursatores"
 br_age_5_prokoursatores_desc: "Serving as the forward arm of the Tagmata, the Prokoursatores prepare the field for the decisive charge. Though more tactically flexible, they remain heavy cavalry first and foremost—trained to close, collide, and overwhelm."

### Age 6 — Revolutions

 br_revolutions_varangians: "Varangōn Bathystachoi"
 br_revolutions_varangians_desc: "Advancing in deep assault formations, the Varangians remain a foreign-born elite bound to the throne. Though their weapons and tactics have changed across generations, their oath and distinct character endure."

 br_age_6_basilikoi: "Basilikoi"
 br_age_6_basilikoi_desc: "The Imperial Horse of the Tagmata, maintained directly by the throne. Though centuries have altered their arms and harness, their role endures—to deliver the crushing blow in the name of the Basileus."


##
 #br_age_5_archontikoi: "Archontikoi"
 #br_age_5_archontikoi_desc: "Drawn from the martial aristocracy and sustained by imperial favor, the Archontikoi represent the mature form of the cataphract #tradition. Wealth, armor, and discipline combine to preserve the Empire’s mounted supremacy."
