### Age 1 — Traditions

 br_tagmata_skoutatoi: "Skoutatoi"
 br_tagmata_skoutatoi_desc: "Professional heavy infantry of the imperial tagmata, equipped with large shields and spears. Disciplined and resilient, the Skoutatoi form the steadfast core of Roman field armies, excelling at holding the line under pressure."

 br_tagmata_toxotai: "Toxotai"
 br_tagmata_toxotai_desc: "Trained archers drawn from the tagmata and frontier regions, the Toxotai provide flexible ranged support. Though lightly armored, their skill with the bow allows them to harass and weaken the enemy before close engagement."

 n_vinland_longship: "Viking Longship"
 n_vinland_longship_desc: "A Viking longship was a fast, shallow-draft, clinker-built vessel used by Norse people for exploration, trade, and raiding, famous for its speed, flexibility, and ability to navigate both open seas and shallow rivers."
 
 br_tagmata_ballistai: "Ballistai"
 br_tagmata_ballistai_desc: "An evolution of classical Roman siegecraft adapted for the battlefield. These torsion-powered engines hurl bolts and stones to break enemy cohesion, favoring open ground and disciplined support from infantry formations."

 br_unit_trebuchet: "Trebuchets"
 br_unit_trebuchet_desc: "Large counterweight-driven siege engines designed to batter fortifications and undermine enemy morale. Trebuchets are powerful but slow to deploy, requiring secure positions and extensive logistical support to operate effectively."

### Age 2 — Renaissance

 br_renaissance_varangians: "Tágma tōn Varangōn"
 br_renaissance_varangians_desc: "The Regiment of the Varangians stands as the sworn shield of the Basileus and guardian of the Sacred Palace. Bound by oath and sustained by imperial favor, they are renowned for discipline, ferocity, and unwavering loyalty to the throne."

 br_age_2_kontaratoi: "Kontaratoi"
 br_age_2_kontaratoi_desc: "Lance-bearing cavalry forming the shock arm of the early imperial armies, trained in disciplined charge and close combat."

### Age 3 — Discovery

 br_discovery_varangians: "Varangoi Pyrovoloi"
 br_discovery_varangians_desc: "Adopting the new fire-weapons of the age, the Varangians have transformed from axe-bearing guards into gun-bearing protectors of the Emperor. Their ancient oath endures, even as their methods of war evolve."

 br_age_3_lonchophoroi: "Lonchophoroi"
 br_age_3_lonchophoroi_desc: "Spear-bearing horsemen refined through improved drill and equipment, capable of sustained engagement and tactical maneuver."

### Age 4 — Reformation

 br_reformation_varangians: "Basilikoi Pyrovoloi"
 br_reformation_varangians_desc: "Now fully integrated into the imperial war machine, these Imperial gun-bearers serve as a permanent and disciplined regiment of the crown, drilled in coordinated volleys and steadfast defense of the throne."

 br_age_4_thorakophoroi: "Thorakophoroi"
 br_age_4_thorakophoroi_desc: "Armored cuirass-bearers who preserve the heavy cavalry tradition while adapting to the changing demands of early modern warfare."

### Age 5 — Absolutism

 br_absolutism_varangians: "Basilikon Tágma"
 br_absolutism_varangians_desc: "Established as a standing Imperial Regiment, the Varangians have become entrenched within the capital. Privileged and influential, their strength lies not only in arms, but in their proximity to the Basileus."

 br_age_5_prokoursatores: "Prokoursatores"
 br_age_5_prokoursatores_desc: "Forward-riding cavalry tasked with reconnaissance, rapid strikes, and battlefield exploitation, reflecting a more flexible imperial doctrine."

### Age 6 — Revolutions

 br_revolutions_varangians: "Tágma Augousteion"
 br_revolutions_varangians_desc: "The Imperial Palace Regiment has endured centuries of reform and modernization. Armed with the latest weapons and deeply embedded within the structures of power, their loyalty remains sworn to the throne—yet their political weight can no longer be ignored."

 br_age_6_basilikoi_hippeis: "Basilikoi Hippeis"
 br_age_6_basilikoi_hippeis_desc: "The Imperial Horse, centrally maintained and directly loyal to the Basileus, standing as the final evolution of the Roman mounted tradition."

 

